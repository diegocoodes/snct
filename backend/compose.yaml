name: snct-backend

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: snct
      POSTGRES_USER: snct
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no arquivo backend/.env}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - snct_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snct -d snct"]
      interval: 5s
      timeout: 5s
      retries: 12

  clamav:
    image: clamav/clamav:stable
    restart: unless-stopped
    ports:
      - "127.0.0.1:3310:3310"
    volumes:
      - snct_clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10

volumes:
  snct_postgres_data:
  snct_clamav_data:
