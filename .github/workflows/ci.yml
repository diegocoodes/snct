name: Qualidade e segurança

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: snct
          MYSQL_DATABASE: snct
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -psnct"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: mysql://root:snct@127.0.0.1:3306/snct
      BETTER_AUTH_URL: https://snct.example.gov.br
      BETTER_AUTH_SECRET: ci-only-secret-with-more-than-32-characters
      SNCT_RATE_LIMIT_SECRET: ci-only-rate-limit-secret-with-32-characters
      SNCT_DATA_ENCRYPTION_KEYS: 1:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      SNCT_ADMIN_EMAIL: admin@example.gov.br
      SNCT_ADMIN_PASSWORD: CiOnly!Password123
      SNCT_SMTP_HOST: smtp.example.gov.br
      SNCT_SMTP_USER: ci
      SNCT_SMTP_PASSWORD: ci-only-password
      SNCT_EMAIL_FROM: SNCT <no-reply@example.gov.br>
      CLAMAV_HOST: 127.0.0.1
      NEXT_PUBLIC_PRIVACY_CONTACT: privacidade@example.gov.br
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json
      - name: Install backend
        working-directory: backend
        run: npm install
      - name: Install frontend
        working-directory: frontend
        run: npm ci
      - name: Audit frontend production deps
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high
      - name: Check production env
        working-directory: frontend
        run: npm run security:check-env
      - name: Migrate database
        working-directory: backend
        run: |
          printf '%s\n' \
            'DATABASE_URL=mysql://root:snct@127.0.0.1:3306/snct' \
            > .env
          npm run db:migrate
      - name: Start backend smoke check
        working-directory: backend
        run: |
          printf '%s\n' \
            'PORT=4001' \
            'DATABASE_URL=mysql://root:snct@127.0.0.1:3306/snct' \
            'BETTER_AUTH_URL=https://snct.example.gov.br' \
            'BETTER_AUTH_SECRET=ci-only-secret-with-more-than-32-characters' \
            'SNCT_RATE_LIMIT_SECRET=ci-only-rate-limit-secret-with-32-characters' \
            'SNCT_DATA_ENCRYPTION_KEYS=1:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=' \
            'SNCT_TRUSTED_ORIGINS=https://snct.example.gov.br' \
            > .env
          npm run start &
          sleep 5
          curl -fsS http://localhost:4001/health
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Test
        working-directory: frontend
        run: npm run test:run
      - name: Build
        working-directory: frontend
        env:
          SNCT_API_ORIGIN: http://localhost:4001
        run: npm run build
